function drawCavaleiro(ctx, x, y, color, accent, u) {
  // Cavalo
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(x - 7, y + 1, 14, 7);
  ctx.fillRect(x - 8, y - 1, 4, 6);
  // Pernas
  ctx.fillRect(x - 6, y + 8, 2, 4);
  ctx.fillRect(x - 2, y + 8, 2, 4);
  ctx.fillRect(x + 2, y + 8, 2, 4);
  ctx.fillRect(x + 5, y + 8, 2, 4);
  // Crina
  ctx.fillStyle = '#1a0f0a';
  ctx.fillRect(x - 8, y - 2, 4, 2);
  // Cavaleiro
  ctx.fillStyle = '#9a9088';
  ctx.beginPath();
  ctx.arc(x, y - 8, 3, 0, Math.PI * 2);
  ctx.fill();
  // Manto/cor do povo
  ctx.fillStyle = color;
  ctx.fillRect(x - 4, y - 5, 8, 7);
  // Lança
  ctx.strokeStyle = '#7a4a23';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 6, y - 12);
  ctx.lineTo(x + 6, y + 4);
  ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.beginPath();
  ctx.moveTo(x + 6, y - 14);
  ctx.lineTo(x + 8, y - 10);
  ctx.lineTo(x + 4, y - 10);
  ctx.closePath();
  ctx.fill();
}

// === PROJÉTEIS E PARTÍCULAS ===
function drawProjectiles() {
  const ctx = G.ctx;
  for (const p of G.projectiles) {
    const x = p.x - G.camera.x;
    const y = p.y - G.camera.y;
    const angle = Math.atan2(p.ty - p.y, p.tx - p.x);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, 0);
    ctx.lineTo(6, 0);
    ctx.stroke();
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.moveTo(6, 0);
    ctx.lineTo(2, -2);
    ctx.lineTo(2, 2);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  const ctx = G.ctx;
  for (const p of G.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - G.camera.x - p.size/2, p.y - G.camera.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function updateParticles(dt) {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt; // gravidade
    p.life -= dt;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

// === SELECTION BOX ===
function drawSelectionBox() {
  if (!G.selectionBox) return;
  const ctx = G.ctx;
  const sb = G.selectionBox;
  const x = Math.min(sb.x1, sb.x2);
  const y = Math.min(sb.y1, sb.y2);
  const w = Math.abs(sb.x2 - sb.x1);
  const h = Math.abs(sb.y2 - sb.y1);
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.strokeRect(x, y, w, h);
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(212, 175, 55, 0.1)';
  ctx.fillRect(x, y, w, h);
}

// === PLACEMENT PREVIEW ===
function drawPlacementPreview() {
  if (!G.pendingBuild) return;
  const ctx = G.ctx;
  const t = worldToTile(G.mouse.x + G.camera.x, G.mouse.y + G.camera.y);
  const def = BUILDINGS[G.pendingBuild.type];
  // Snap (centralizar no cursor)
  const tx = t.tx - Math.floor(def.size/2);
  const ty = t.ty - Math.floor(def.size/2);
  const valid = canPlaceBuilding(G.pendingBuild.type, tx, ty);
  const px = tx * CONFIG.TILE_SIZE - G.camera.x;
  const py = ty * CONFIG.TILE_SIZE - G.camera.y;
  const w = def.size * CONFIG.TILE_SIZE;
  const h = def.size * CONFIG.TILE_SIZE;
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = valid ? 'rgba(80, 200, 80, 0.3)' : 'rgba(220, 60, 60, 0.4)';
  ctx.fillRect(px, py, w, h);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = valid ? '#3fc850' : '#d44';
  ctx.lineWidth = 2;
  ctx.strokeRect(px, py, w, h);
}

// === MINIMAP ===
function drawMinimap() {
  const ctx = G.miniCtx;
  const cw = G.miniCanvas.width;
  const ch = G.miniCanvas.height;
  const sx = cw / (CONFIG.MAP_W * CONFIG.TILE_SIZE);
  const sy = ch / (CONFIG.MAP_H * CONFIG.TILE_SIZE);
  // Fundo
  ctx.fillStyle = '#3a4a25';
  ctx.fillRect(0, 0, cw, ch);
  // Terreno
  for (let y = 0; y < CONFIG.MAP_H; y++) {
    for (let x = 0; x < CONFIG.MAP_W; x++) {
      const t = G.map[y][x];
      const px = x * CONFIG.TILE_SIZE * sx;
      const py = y * CONFIG.TILE_SIZE * sy;
      const w = CONFIG.TILE_SIZE * sx + 1;
      const h = CONFIG.TILE_SIZE * sy + 1;
      if (t === T_WATER) ctx.fillStyle = '#3a6090';
      else if (t === T_FOREST) ctx.fillStyle = '#2d5e22';
      else if (t === T_STONE) ctx.fillStyle = '#7a7068';
      else if (t === T_GOLD) ctx.fillStyle = '#d4af37';
      else if (t === T_FOOD) ctx.fillStyle = '#c8364c';
      else continue;
      ctx.fillRect(px, py, w, h);
    }
  }
  // Edifícios
  for (const b of G.buildings) {
    const px = b.tileX * CONFIG.TILE_SIZE * sx;
    const py = b.tileY * CONFIG.TILE_SIZE * sy;
    const w = b.size * CONFIG.TILE_SIZE * sx;
    const h = b.size * CONFIG.TILE_SIZE * sy;
    ctx.fillStyle = b.owner === 'player' ? '#5fc850' : '#d44';
    ctx.fillRect(px, py, Math.max(3, w), Math.max(3, h));
  }
  // Unidades
  for (const u of G.units) {
    if (u.hp <= 0) continue;
    const px = u.x * sx;
    const py = u.y * sy;
    ctx.fillStyle = u.owner === 'player' ? '#5fc850' : '#d44';
    ctx.fillRect(px - 1, py - 1, 3, 3);
  }
  // Viewport
  const vx = G.camera.x * sx;
  const vy = G.camera.y * sy;
  const vw = G.canvas.width * sx;
  const vh = G.canvas.height * sy;
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 2;
  ctx.strokeRect(vx, vy, vw, vh);
}

// ============================================================
// LOOP PRINCIPAL
// ============================================================
let lastT = 0;
function gameLoop(t) {
  const dt = Math.min(0.1, (t - lastT) / 1000);
  lastT = t;

  if (!G.paused && !G.gameOver) {
    G.time += dt;
    update(dt);
  }
  render();

  // Toast timer
  if (G.toastTimer > 0) {
    G.toastTimer -= dt;
    if (G.toastTimer <= 0) document.getElementById('toast').style.display = 'none';
  }

  requestAnimationFrame(gameLoop);
}

function update(dt) {
  // Scroll de borda
  const edge = 50;
  const speed = 600;
  if (G.mouse.x < edge && G.mouse.x >= 0) G.camera.x -= speed * dt;
  if (G.mouse.x > G.canvas.width - edge) G.camera.x += speed * dt;
  if (G.mouse.y < edge + 50 && G.mouse.y >= 50) G.camera.y -= speed * dt;
  if (G.mouse.y > G.canvas.height - edge - 160) G.camera.y += speed * dt;
  G.camera.x = clamp(G.camera.x, 0, CONFIG.MAP_W * CONFIG.TILE_SIZE - G.canvas.width);
  G.camera.y = clamp(G.camera.y, 0, CONFIG.MAP_H * CONFIG.TILE_SIZE - G.canvas.height);

  // Update unidades
  for (let i = G.units.length - 1; i >= 0; i--) {
    const u = G.units[i];
    if (u.hp <= 0) {
      G.units.splice(i, 1);
      continue;
    }
    updateUnit(u, dt);
  }

  // Update edifícios
  updateBuildings(dt);

  // Update projéteis
  updateProjectiles(dt);

  // Update partículas
  updateParticles(dt);

  // IA
  updateAI(dt);

  // Atualizar HUD
  updateHUD();
}

function render() {
  const ctx = G.ctx;
  ctx.fillStyle = '#1a2810';
  ctx.fillRect(0, 0, G.canvas.width, G.canvas.height);

  drawMap();

  // Ordenar entidades por Y para depth
  const sortable = [];
  for (const b of G.buildings) sortable.push({ y: b.y + b.size * CONFIG.TILE_SIZE / 2, draw: () => drawBuilding(ctx, b) });
  for (const u of G.units) sortable.push({ y: u.y, draw: () => drawUnit(ctx, u) });
  sortable.sort((a, b) => a.y - b.y);
  for (const s of sortable) s.draw();

  drawProjectiles();
  drawParticles();
  drawPlacementPreview();
  drawSelectionBox();
  drawMinimap();
}

// ============================================================
// HUD UPDATE
// ============================================================
function updateHUD() {
  document.getElementById('r-wood').textContent = Math.floor(G.player.resources.wood);
  document.getElementById('r-food').textContent = Math.floor(G.player.resources.food);
  document.getElementById('r-gold').textContent = Math.floor(G.player.resources.gold);
  document.getElementById('r-stone').textContent = Math.floor(G.player.resources.stone);

  const popUsed = G.units.filter(u => u.owner === 'player' && u.hp > 0).length;
  document.getElementById('hud-info-pop').textContent = `${popUsed}/${G.player.popMax}`;
  const m = Math.floor(G.time / 60);
  const s = Math.floor(G.time % 60);
  document.getElementById('hud-info-time').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

  updateSelectionPanel();
}

function updateSelectionPanel() {
  const titleEl = document.getElementById('sel-title');
  const statsEl = document.getElementById('sel-stats');
  const actionsEl = document.getElementById('actions-panel');

  if (G.selected.length === 0) {
    titleEl.textContent = 'Sem seleção';
    statsEl.innerHTML = 'Clique em uma unidade ou edifício';
    actionsEl.innerHTML = '';
    return;
  }

  // Buscar entidades selecionadas
  const ents = [];
  for (const id of G.selected) {
    const u = G.units.find(u => u.id === id);
    if (u) { ents.push(u); continue; }
    const b = G.buildings.find(b => b.id === id);
    if (b) { ents.push(b); continue; }
  }
  if (ents.length === 0) {
    G.selected = [];
    return updateSelectionPanel();
  }

  if (ents.length === 1) {
    const e = ents[0];
    titleEl.textContent = e.name;
    if (e.isUnit) {
      statsEl.innerHTML = `
        <div>HP: ${Math.ceil(e.hp)}/${e.maxHp}</div>
        <div>Dano: ${e.damage} · Alcance: ${e.range}</div>
        <div>Estado: ${stateLabel(e.state)}</div>
        ${e.carrying ? `<div>Carregando: ${Math.floor(e.carrying.amount)} ${resLabel(e.carrying.type)}</div>` : ''}
      `;
    } else {
      statsEl.innerHTML = `
        <div>HP: ${Math.ceil(e.hp)}/${e.maxHp}</div>
        ${!e.completed ? `<div>Construindo: ${Math.floor(e.buildProgress * 100)}%</div>` : ''}
        ${e.trainQueue.length > 0 ? `<div>Treinando: ${UNITS[e.trainQueue[0]].name} (${Math.floor(e.trainProgress / UNITS[e.trainQueue[0]].trainTime * 100)}%) · Fila: ${e.trainQueue.length}</div>` : ''}
      `;
    }
    renderActions(e, ents);
  } else {
    titleEl.textContent = `${ents.length} unidades`;
    const types = {};
    for (const e of ents) types[e.name] = (types[e.name] || 0) + 1;
    statsEl.innerHTML = Object.entries(types).map(([n,c]) => `<div>${n} × ${c}</div>`).join('');
    renderActions(ents[0], ents);
  }
}

function stateLabel(s) {
  const m = { idle: 'Parado', moving: 'Movendo', attacking: 'Atacando', gathering: 'Coletando', returning: 'Retornando', building: 'Construindo' };
  return m[s] || s;
}
function resLabel(r) { return { wood: 'madeira', food: 'comida', gold: 'ouro', stone: 'pedra' }[r] || r; }

function renderActions(e, ents) {
  const actionsEl = document.getElementById('actions-panel');
  actionsEl.innerHTML = '';
  if (e.owner !== 'player') return;

  if (e.isUnit) {
    if (e.canGather) {
      // Aldeão: botões de construção
      const buildables = ['casa','serraria','celeiro','mineracao','quartel','arqueiros','estabulo','torre','muralha'];
      for (const bt of buildables) {
        addActionBtn(actionsEl, BUILDINGS[bt].name, BUILDINGS[bt].cost, () => {
          G.pendingBuild = { type: bt };
          document.body.classList.add('placing');
          showToast(`Selecione local para ${BUILDINGS[bt].name}`);
        }, BUILDINGS[bt], null);
      }
    }
    addActionBtn(actionsEl, 'Parar', null, () => {
      for (const u of ents) {
        if (u.isUnit) {
          u.state = 'idle';
          u.target = null;
          u.moveTarget = null;
        }
      }
    }, null, '⏹');
  } else if (e.isBuilding && e.completed) {
    const def = BUILDINGS[e.type];
    if (def.trains) {
      for (const ut of def.trains) {
        const cost = getUnitCost(ut, G.player.civ);
        addActionBtn(actionsEl, `Treinar ${UNITS[ut].name}`, cost, () => {
          if (canAfford(G.player, cost, G.player.civ)) {
            const popUsed = G.units.filter(u => u.owner === 'player' && u.hp > 0).length + G.buildings.reduce((a,b) => a + (b.owner === 'player' ? b.trainQueue.length : 0), 0);
            if (popUsed >= G.player.popMax) {
              showToast('Construa mais Casas para aumentar a população!');
              return;
            }
            pay(G.player, cost, G.player.civ);
            e.trainQueue.push(ut);
          } else {
            showToast('Recursos insuficientes!');
          }
        }, null, null);
      }
    }
    if (e.type === 'centro') {
      addActionBtn(actionsEl, `Treinar Aldeão`, UNITS.aldeao.cost, () => {
        const cost = UNITS.aldeao.cost;
        if (canAfford(G.player, cost, G.player.civ)) {
          const popUsed = G.units.filter(u => u.owner === 'player' && u.hp > 0).length + G.buildings.reduce((a,b) => a + (b.owner === 'player' ? b.trainQueue.length : 0), 0);
          if (popUsed >= G.player.popMax) {
            showToast('Construa mais Casas para aumentar a população!');
            return;
          }
          pay(G.player, cost, G.player.civ);
          e.trainQueue.push('aldeao');
        } else {
          showToast('Recursos insuficientes!');
        }
      }, null, null);
    }
  }
}

function addActionBtn(parent, label, cost, onClick, buildingDef, icon) {
  const btn = document.createElement('button');
  btn.className = 'action-btn';
  let costHTML = '';
  if (cost) {
    const c = {...cost};
    // Aplicar bônus de saxões para muralhas
    if (G.player.civ === 'saxoes' && buildingDef && buildingDef.name === 'Muralha' && c.stone) c.stone = Math.round(c.stone * 0.5);
    const parts = [];
    if (c.wood) parts.push(`<span>🪵${c.wood}</span>`);
    if (c.food) parts.push(`<span>🍎${c.food}</span>`);
    if (c.gold) parts.push(`<span>⚜${c.gold}</span>`);
    if (c.stone) parts.push(`<span>⛰${c.stone}</span>`);
    costHTML = `<span class="action-cost">${parts.join('')}</span>`;
  }
  btn.innerHTML = `<div style="font-size:0.7rem;font-weight:700;line-height:1;margin-bottom:2px;">${label}</div>${costHTML}`;
  btn.onclick = onClick;
  if (cost && !canAfford(G.player, cost, G.player.civ)) {
    btn.disabled = true;
  }
  parent.appendChild(btn);
}

// ============================================================
// INPUT
// ============================================================
function getEntityAt(wx, wy) {
  // Unidades primeiro (mais específicas)
  for (const u of G.units) {
    if (u.hp <= 0) continue;
    if (Math.abs(u.x - wx) < 12 && Math.abs(u.y - wy) < 14) return u;
  }
  // Edifícios
  const t = worldToTile(wx, wy);
  if (G.occupancy[t.ty] && G.occupancy[t.ty][t.tx] > 0) {
    const id = G.occupancy[t.ty][t.tx];
    if (id !== 9) {
      const b = G.buildings.find(b => b.id === id);
      if (b) return b;
    }
  }
  // Recurso
  for (const r of G.resources) {
    if (r.amount <= 0) continue;
    if (Math.abs(r.x - wx) < 16 && Math.abs(r.y - wy) < 16) return r;
  }
  return null;
}

function setupInput() {
  G.canvas.addEventListener('mousedown', (e) => {
    if (G.gameOver) return;
    G.mouse.isDown = true;
    G.mouse.button = e.button;
    G.mouse.downX = e.offsetX;
    G.mouse.downY = e.offsetY;
    G.mouse.x = e.offsetX;
    G.mouse.y = e.offsetY;

    if (e.button === 0 && G.pendingBuild) {
      // Posicionar edifício
      const wx = e.offsetX + G.camera.x;
      const wy = e.offsetY + G.camera.y;
      const t = worldToTile(wx, wy);
      const def = BUILDINGS[G.pendingBuild.type];
      const tx = t.tx - Math.floor(def.size/2);
      const ty = t.ty - Math.floor(def.size/2);
      if (canPlaceBuilding(G.pendingBuild.type, tx, ty)) {
        const cost = def.cost;
        if (canAfford(G.player, cost, G.player.civ)) {
          // Aldeões selecionados vão construir
          const builders = G.selected.map(id => G.units.find(u => u.id === id)).filter(u => u && u.canGather && u.owner === 'player');
          if (builders.length === 0) {
            showToast('Selecione ao menos 1 aldeão para construir.');
            return;
          }
          pay(G.player, cost, G.player.civ);
          const b = createBuilding(G.pendingBuild.type, tx, ty, 'player', false);
          for (const bd of builders) commandBuild(bd, b);
          G.pendingBuild = null;
          document.body.classList.remove('placing');
        } else {
          showToast('Recursos insuficientes!');
        }
      } else {
        showToast('Local inválido para construir!');
      }
      return;
    }

    if (e.button === 2) {
      // Botão direito = comando
      const wx = e.offsetX + G.camera.x;
      const wy = e.offsetY + G.camera.y;
      const target = getEntityAt(wx, wy);
      const playerUnits = G.selected.map(id => G.units.find(u => u.id === id)).filter(u => u && u.owner === 'player');
      if (target) {
        if (target.owner === 'player') {
          // Recurso ou amigo
          for (const u of playerUnits) commandMove(u, wx, wy);
        } else if (target.owner === 'ai') {
          // Atacar
          for (const u of playerUnits) commandAttack(u, target);
        } else if (target.amount !== undefined) {
          // Recurso
          for (const u of playerUnits) {
            if (u.canGather) commandGather(u, target);
            else commandMove(u, target.x, target.y);
          }
        }
      } else {
        for (const u of playerUnits) commandMove(u, wx, wy);
      }
    }
  });

  G.canvas.addEventListener('mousemove', (e) => {
    G.mouse.x = e.offsetX;
    G.mouse.y = e.offsetY;
    if (G.mouse.isDown && G.mouse.button === 0 && !G.pendingBuild) {
      const dx = e.offsetX - G.mouse.downX;
      const dy = e.offsetY - G.mouse.downY;
      if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        G.mouse.isDragging = true;
        G.selectionBox = { x1: G.mouse.downX, y1: G.mouse.downY, x2: e.offsetX, y2: e.offsetY };
      }
    }
  });

  G.canvas.addEventListener('mouseup', (e) => {
    if (G.gameOver) { G.mouse.isDown = false; return; }
    if (e.button === 0) {
      if (G.mouse.isDragging && G.selectionBox) {
        // Selecionar unidades dentro da caixa
        const sb = G.selectionBox;
        const x1 = Math.min(sb.x1, sb.x2) + G.camera.x;
        const y1 = Math.min(sb.y1, sb.y2) + G.camera.y;
        const x2 = Math.max(sb.x1, sb.x2) + G.camera.x;
        const y2 = Math.max(sb.y1, sb.y2) + G.camera.y;
        G.selected = [];
        for (const u of G.units) {
          if (u.owner === 'player' && u.hp > 0 && u.x >= x1 && u.x <= x2 && u.y >= y1 && u.y <= y2) {
            G.selected.push(u.id);
          }
        }
      } else if (!G.pendingBuild) {
        // Click simples
        const wx = e.offsetX + G.camera.x;
        const wy = e.offsetY + G.camera.y;
        const ent = getEntityAt(wx, wy);
        if (ent) {
          if (ent.amount !== undefined) {
            // Recurso — não selecionável
            G.selected = [];
          } else {
            G.selected = [ent.id];
          }
        } else {
          G.selected = [];
        }
      }
    }
    G.mouse.isDown = false;
    G.mouse.isDragging = false;
    G.selectionBox = null;
  });

  G.canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  // Minimap
  G.miniCanvas.addEventListener('mousedown', (e) => {
    const rect = G.miniCanvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    G.camera.x = mx * CONFIG.MAP_W * CONFIG.TILE_SIZE - G.canvas.width / 2;
    G.camera.y = my * CONFIG.MAP_H * CONFIG.TILE_SIZE - G.canvas.height / 2;
    G.camera.x = clamp(G.camera.x, 0, CONFIG.MAP_W * CONFIG.TILE_SIZE - G.canvas.width);
    G.camera.y = clamp(G.camera.y, 0, CONFIG.MAP_H * CONFIG.TILE_SIZE - G.canvas.height);
  });

  // Teclado
  window.addEventListener('keydown', (e) => {
    if (G.gameOver) return;
    if (e.key === 'h' || e.key === 'H') {
      const center = G.buildings.find(b => b.owner === 'player' && b.type === 'centro');
      if (center) {
        G.camera.x = center.x - G.canvas.width / 2;
        G.camera.y = center.y - G.canvas.height / 2;
        G.camera.x = clamp(G.camera.x, 0, CONFIG.MAP_W * CONFIG.TILE_SIZE - G.canvas.width);
        G.camera.y = clamp(G.camera.y, 0, CONFIG.MAP_H * CONFIG.TILE_SIZE - G.canvas.height);
      }
    } else if (e.key === 'p' || e.key === 'P') {
      G.paused = !G.paused;
      showToast(G.paused ? '⏸ Pausado' : '▶ Em jogo');
    } else if (e.key === 'Escape') {
      if (G.pendingBuild) {
        G.pendingBuild = null;
        document.body.classList.remove('placing');
      } else {
        G.selected = [];
      }
    } else if (e.key === 's' || e.key === 'S') {
      for (const id of G.selected) {
        const u = G.units.find(u => u.id === id);
        if (u && u.owner === 'player') {
          u.state = 'idle';
          u.target = null;
          u.moveTarget = null;
        }
      }
    } else if (e.key === 'ArrowLeft') G.camera.x -= 50;
    else if (e.key === 'ArrowRight') G.camera.x += 50;
    else if (e.key === 'ArrowUp') G.camera.y -= 50;
    else if (e.key === 'ArrowDown') G.camera.y += 50;
    G.camera.x = clamp(G.camera.x, 0, CONFIG.MAP_W * CONFIG.TILE_SIZE - G.canvas.width);
    G.camera.y = clamp(G.camera.y, 0, CONFIG.MAP_H * CONFIG.TILE_SIZE - G.canvas.height);
  });
}

// ============================================================
// FIM DE JOGO
// ============================================================
function endGame(victory) {
  if (G.gameOver) return;
  G.gameOver = true;
  const screen = document.getElementById('endgame-screen');
  screen.className = victory ? 'victory' : 'defeat';
  screen.style.display = 'flex';
  document.getElementById('endgame-title').textContent = victory ? 'VITÓRIA!' : 'DERROTA';
  const m = Math.floor(G.time / 60);
  const s = Math.floor(G.time % 60);
  const stats = G.player.lostStats;
  document.getElementById('endgame-stats').innerHTML = `
    <div>Tempo de jogo: ${m}m ${s}s</div>
    <div>Reino jogado: ${CIVS[G.player.civ].name}</div>
    <div>Reino inimigo: ${CIVS[G.ai.civ].name}</div>
    <div>🪵 Madeira coletada: ${stats.gathered.wood || 0}</div>
    <div>🍎 Comida coletada: ${stats.gathered.food || 0}</div>
    <div>⚜ Ouro coletado: ${stats.gathered.gold || 0}</div>
    <div>⛰ Pedra coletada: ${stats.gathered.stone || 0}</div>
    <div>⚔ Unidades treinadas: ${stats.trained}</div>
    <div>🏰 Edifícios construídos: ${stats.built}</div>
  `;
}

// ============================================================
// TELA INICIAL — SELEÇÃO DE POVO
// ============================================================
function drawCivBanner(canvas, civ) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 80, 80);
  const c = CIVS[civ];
  // Escudo
  ctx.fillStyle = c.color;
  ctx.beginPath();
  ctx.moveTo(40, 8);
  ctx.lineTo(72, 16);
  ctx.lineTo(72, 50);
  ctx.quadraticCurveTo(72, 70, 40, 76);
  ctx.quadraticCurveTo(8, 70, 8, 50);
  ctx.lineTo(8, 16);
  ctx.closePath();
  ctx.fill();
  // Borda
  ctx.strokeStyle = c.accent;
  ctx.lineWidth = 3;
  ctx.stroke();
  // Símbolo
  ctx.fillStyle = c.accent;
  ctx.font = 'bold 28px MedievalSharp';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Símbolos por povo
  const symbols = {
    francos: '♞', saxoes: '⛨', normandos: '⚔', vikings: '⚒', iberos: '☼', eslavos: '✦'
  };
  ctx.fillText(symbols[civ] || '⚔', 40, 42);
}

let selectedCiv = null;
function buildStartScreen() {
  const grid = document.getElementById('civ-grid');
  for (const key of Object.keys(CIVS)) {
    const c = CIVS[key];
    const card = document.createElement('div');
    card.className = 'civ-card';
    card.innerHTML = `
      <canvas class="civ-banner" width="80" height="80"></canvas>
      <div class="civ-name">${c.name}</div>
      <div class="civ-bonus">${c.bonus}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.civ-card').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      selectedCiv = key;
      document.getElementById('start-btn').disabled = false;
    };
    grid.appendChild(card);
    drawCivBanner(card.querySelector('canvas'), key);
  }
  document.getElementById('start-btn').onclick = () => {
    if (!selectedCiv) return;
    document.getElementById('start-screen').style.display = 'none';
    setupGame(selectedCiv);
    requestAnimationFrame(gameLoop);
  };
}

// ============================================================
// INIT
// ============================================================
function init() {
  G.canvas = document.getElementById('map-canvas');
  G.ctx = G.canvas.getContext('2d');
  G.miniCanvas = document.getElementById('minimap');
  G.miniCtx = G.miniCanvas.getContext('2d');

  function resize() {
    G.canvas.width = window.innerWidth;
    G.canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  setupInput();
  buildStartScreen();
}

init();
